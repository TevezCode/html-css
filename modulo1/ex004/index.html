<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="cursoemvideo.ico">
    <title>Formatação de Texto</title>
</head>
<body>
    <h1>Principais Formatações</h1>

    <h2>Negrito / Destaque</h2>
    <p>Nesta frase temos <b>termo negrito</b> usando a tag b</p>
    <p>Nesta frase temos <strong>termo negrito</strong> usando a tag strong</p>

    <h2>Itálico / Ênfase</h2>
    <p>
        Nesta frase temos <i>termo itálico</i> usando a tag i
    </p>

    <p>
        Nesta frase temos um <em>termo em ênfase</em> usando a tag em
    </p>
</body>
</html>
