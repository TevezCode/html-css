<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início | Site Institucional</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    *   {
        font-family: Arial, Helvetica, sans-serif;
    }

    body    {
        background-color: #13102e;
        margin: 0px;
    }


    main    {
        background-image: linear-gradient(to left, #271e58, #363966);
        margin: 0px;
    }

    h1  {
        font-family: 'Bebas Neue', cursive;
        font-size: 3em;
        text-align: center;
        color: white;
        text-shadow: 0px 0px 5px white;
    }

    main p  {
        text-align: center;
        color: white;
    }

    ul  {
        background-image: linear-gradient(to right, #232449, #0f0f0f);
        padding: 20px;
        box-shadow: 0px 0px 10px #0f0f0f;
    }

    ul  {
        list-style-type: none;
        columns: 2;
    }


    li  {
        background-image: linear-gradient(to right, #504c81, #362058);
        margin: 10px;
        padding: 20px;
        text-align: center;
        border-radius: 20px;
    }


    li:hover    {
        text-shadow: 0px 0px 5px white;
        background-image: linear-gradient(to right, #333055, #180a2c);
        transition-duration: 0.1s;
    }


    a   {
        color: white;
        text-decoration: none;
    }




    
  </style>
</head>
<body>
  <section class="container">
    <header>
      <h1>Curso HTML5 e CSS3</h1>
    </header>

      <ul>
          <li>
            <a href="modulo1/index.html">Módulo 1</a>
        </li>
          <li>
            <a href="modulo2/index.html">Módulo 2</a>
        </li>
      </ul>

  </section>
</body>
</html>
